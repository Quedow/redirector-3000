<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <title>Redirector 3000</title>
  <link rel="icon" type="image/x-icon" href="/icons/favicon.ico">
  <style>
    body {
      font-family: system-ui, Arial;
      padding: 12px;
      max-width: 900px;
    }

    label {
      display: block;
      margin-top: 8px;
    }

    input[type=text],
    textarea {
      width: 100%;
      box-sizing: border-box;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }

    td,
    th {
      border: 1px solid #ddd;
      padding: 6px;
      text-align: left;
    }
  </style>
</head>

<body>
  <h1>Redirector 3000 (by Danamix)</h1>

  <h2>Rules</h2>
  <form id="rule-form">
    <label>Name<input type="text" id="name" required /></label>
    <label>Replace (Regex)
      <input type="text" id="pattern" placeholder="This part in URL" required />
    </label>
    <label>With
      <input type="text" id="output" placeholder="This part" required />
    </label>
    <label><input type="checkbox" id="enabled" checked />Enable</label>
    <button type="submit">Save</button>
  </form>

  <h2>Existing rules</h2>
  <table id="rules-table">
    <thead>
      <tr>
        <th>Name</th>
        <th>Replace</th>
        <th>With</th>
        <th>Enabled</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script src="options.js"></script>
</body>

</html>
